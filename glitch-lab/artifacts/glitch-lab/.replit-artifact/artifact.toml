kind = "web"
previewPath = "/"
title = "GLITCH LAB"
version = "1.0.0"
id = "artifacts/glitch-lab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20167

[services.development]
run = "pnpm --filter @workspace/glitch-lab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/glitch-lab", "run", "build" ]
publicDir = "artifacts/glitch-lab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20167"
BASE_PATH = "/"
